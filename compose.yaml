services:
  hid-e2e:
    build:
      context: .
      dockerfile: docker/hid-e2e/Dockerfile
    command: ["check"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      KBD_E2E_ADAPTER: hci0
      KBD_E2E_CENTRAL_ADAPTER: hci1
      KBD_E2E_NAME: Rpi Keyboard Switcher
      KBD_E2E_TEXT: a
    privileged: true
    volumes:
      - .:/work:ro
    working_dir: /work
