name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.22"
          enable-cache: true

      - name: Install check dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gobject-introspection \
            libcairo2-dev \
            libdbus-1-dev \
            libfuse3-dev \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            pkg-config \
            ruby \
            shellcheck

      - name: Check
        run: make ci
